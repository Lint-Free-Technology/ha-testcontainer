# Home Assistant demo configuration for ha-testcontainer
#
# This configuration is designed to be mounted into the test container and
# provide a rich environment for visual and integration testing.
#
# Key integrations enabled:
#   default_config  – recorder, history, logbook, mobile_app, …
#   demo            – virtual entities (lights, sensors, weather, etc.)
#   uix             – UI eXtension (CSS customisation, set up via config-flow)
#
# The Lovelace dashboard is split into two modes:
#   default (/lovelace)              – storage mode (managed via the UI)
#   lovelace-uix-test (/lovelace/uix-test) – YAML mode (UIX test views, committed to git)

homeassistant:
  name: HA TestContainer
  country: US
  unit_system: metric
  time_zone: UTC

default_config:

demo:

lovelace:
  mode: storage
  dashboards:
    lovelace-uix-test:
      mode: yaml
      title: UIX Tests
      filename: lovelace.yaml

frontend:
  themes: !include_dir_merge_named themes/

logger:
  default: warning
  logs:
    custom_components.uix: debug
